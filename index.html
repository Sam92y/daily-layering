<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#002FA7">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Daily Layering">
<title>Daily Layering — composer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='18' fill='%23002FA7'/%3E%3Cg fill='none' stroke='%23F3ECDA' stroke-linecap='round'%3E%3Ccircle cx='50' cy='50' r='37' stroke-width='1.6' stroke-dasharray='13 20'/%3E%3Ccircle cx='50' cy='50' r='29' stroke-width='2' stroke-dasharray='22 27'/%3E%3C/g%3E%3Cg stroke='%23F3ECDA' stroke-width='2.4' fill='none' stroke-linejoin='round'%3E%3Cpath d='M50 27 Q57 50 50 73 Q43 50 50 27 Z'/%3E%3Cpath d='M27 50 Q50 43 73 50 Q50 57 27 50 Z'/%3E%3C/g%3E%3C/svg%3E">
<style>
  :root{
    --klein:#002FA7; --klein-deep:#002088; --cream:#F3ECDA; --paper:#FBF7EE;
    --stage:#EFE8D7; --ink:#0C1430; --bg:#ECE4D2; --mut:rgba(12,20,48,.55);
    --line:rgba(0,47,167,.14); --line2:rgba(0,47,167,.1);
    --max:980px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{-webkit-text-size-adjust:100%}
  body{background:var(--bg);color:var(--ink);font-family:'Hanken Grotesk',system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;line-height:1.5;min-height:100dvh}
  .serif{font-family:'Cormorant Garamond',Georgia,serif}
  button{font-family:inherit;cursor:pointer}
  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important;scroll-behavior:auto!important}}

  .shell{max-width:var(--max);margin:0 auto;padding:22px 16px 60px}
  .card{background:var(--paper);border:1px solid var(--line);border-radius:8px;
    box-shadow:0 24px 60px -34px rgba(0,32,138,.5);overflow:hidden}

  /* ---- bandeau Klein ---- */
  .band{display:flex;align-items:center;justify-content:space-between;gap:12px;
    padding:16px 22px;background:var(--klein);position:sticky;top:0;z-index:20}
  .brand{display:flex;align-items:center;gap:12px;min-width:0}
  .brand span{font-weight:600;font-size:13px;letter-spacing:.3em;color:var(--cream);white-space:nowrap}
  .tabs{display:flex;gap:4px;background:rgba(243,236,218,.14);border-radius:999px;padding:4px;flex:none}
  .tab{border:none;border-radius:999px;padding:7px 14px;font-weight:600;font-size:10px;letter-spacing:.1em;
    text-transform:uppercase;background:none;color:rgba(243,236,218,.7);transition:.2s;white-space:nowrap}
  .tab.on{background:var(--cream);color:var(--klein)}

  .grid{display:grid;grid-template-columns:1.32fr 1fr}

  /* ---- scène composer ---- */
  .stage{background:var(--stage);padding:30px 28px;border-right:1px solid var(--line2);
    min-height:430px;display:flex;flex-direction:column}
  .stage-h{display:flex;align-items:baseline;gap:10px}
  .klabel{font-weight:600;font-size:10px;letter-spacing:.24em;text-transform:uppercase;color:rgba(0,47,167,.6)}
  .stage-title{font-size:17px;font-style:italic;color:rgba(0,47,167,.7)}
  .stage-fig{flex:1;display:flex;align-items:center;justify-content:center;padding:10px 0}
  .fig{display:flex;align-items:flex-end}
  .piece{position:relative;border-radius:2px;background-size:cover;background-position:center;
    border:1px solid rgba(12,20,48,.13);transition:background-color .35s ease}
  .piece .ptag{position:absolute;top:10px;left:11px;font-weight:600;font-size:9px;letter-spacing:.2em;color:rgba(0,47,167,.8)}
  .piece .pnm{position:absolute;bottom:11px;left:11px;right:11px;font-weight:500;font-size:10px;line-height:1.4;
    font-family:ui-monospace,Menlo,monospace;color:rgba(12,20,48,.66)}
  .piece.bas{width:185px;height:240px;box-shadow:0 14px 34px -18px rgba(0,32,138,.5);transform:rotate(-2.5deg);z-index:1}
  .piece.haut{width:185px;height:240px;margin-left:-66px;margin-bottom:54px;
    box-shadow:0 22px 42px -16px rgba(0,32,138,.55);transform:rotate(3deg);z-index:2}
  .piece.photo .pnm{background:rgba(251,247,238,.78);border-radius:3px;padding:3px 5px}

  /* ---- panneau contrôles ---- */
  .panel{padding:24px 22px;display:flex;flex-direction:column;gap:18px}
  .field>.klabel{display:block;margin-bottom:12px}
  .shelf{display:flex;gap:10px;flex-wrap:wrap}
  .thumb{border:none;background:none;padding:0;display:flex;flex-direction:column;gap:6px;width:62px;
    text-align:left;transition:transform .18s ease}
  .thumb:hover{transform:translateY(-2px)}
  .sw{height:62px;border-radius:3px;background-size:cover;background-position:center;
    border:1px solid rgba(12,20,48,.14);position:relative}
  .thumb.on .sw{border:1.5px solid var(--klein);box-shadow:0 6px 14px -8px rgba(0,32,138,.5)}
  .sw .del{position:absolute;top:-7px;right:-7px;width:18px;height:18px;border-radius:50%;border:none;
    background:var(--klein);color:var(--cream);font-size:11px;line-height:18px;text-align:center;padding:0}
  .sname{font-weight:500;font-size:9px;line-height:1.25;font-family:ui-monospace,Menlo,monospace;color:rgba(12,20,48,.5)}
  .thumb.on .sname{color:var(--klein)}
  .stripe{background-image:repeating-linear-gradient(135deg,rgba(12,20,48,.05) 0 7px,transparent 7px 14px)}
  .piece.stripe{background-image:repeating-linear-gradient(135deg,rgba(12,20,48,.05) 0 9px,transparent 9px 18px)}

  .btn{border-radius:4px;padding:12px;font-weight:600;font-size:11px;letter-spacing:.1em;
    text-transform:uppercase;transition:.18s}
  .btn.small{padding:9px 13px;font-size:10px}
  .btn-add{border:1px dashed rgba(0,47,167,.4);background:none;color:rgba(0,47,167,.85);
    font-weight:500;letter-spacing:.04em;text-transform:none}
  .btn-add:hover{background:rgba(0,47,167,.06)}
  .btn-primary{border:none;background:var(--klein);color:var(--cream)}
  .btn-primary:hover{background:var(--klein-deep)}
  .btn-ghost{border:1px solid rgba(0,47,167,.4);background:none;color:var(--klein)}
  .btn-ghost:hover{background:rgba(0,47,167,.06)}
  .panel .btn-primary.save{margin-top:6px}

  /* ---- détail ---- */
  .grid.detail{grid-template-columns:1.2fr 1fr}
  .stage.detail{align-items:center;justify-content:center}
  .det{padding:28px 24px;display:flex;flex-direction:column}
  .det-title{font-weight:500;font-size:30px;line-height:1.05;color:var(--ink);margin:9px 0 22px}
  .det-row{border-top:1px solid rgba(0,47,167,.13);padding:14px 0;display:flex;justify-content:space-between;gap:12px}
  .det-row .v{font-family:ui-monospace,Menlo,monospace;font-size:12px;color:var(--ink);text-align:right}
  .det-row .v small{color:rgba(12,20,48,.5)}
  .pal{display:flex;align-items:center;gap:12px}
  .dots{display:flex;gap:7px}
  .dot{width:17px;height:17px;border-radius:50%;border:1px solid rgba(12,20,48,.15)}
  .det-act{margin-top:auto;display:flex;gap:10px;padding-top:18px}
  .det-act .btn{flex:1}

  /* ---- vue Couleurs (moteur Wada) ---- */
  .cv-pad{padding:26px 24px;min-height:430px;display:flex;flex-direction:column}
  .cv-idle{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:16px}
  .cv-idle .big{font-size:30px;color:var(--ink)}
  .cv-idle .sub{color:var(--mut);max-width:42ch;font-size:14px}
  .cv-pick{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px}
  .pcanvas{max-width:100%;max-height:62vh;height:auto;border-radius:6px;border:1px solid var(--line);
    cursor:crosshair;touch-action:manipulation;box-shadow:0 18px 44px -28px rgba(0,32,138,.55)}
  .pickbar{display:flex;align-items:center;gap:14px;flex-wrap:wrap;justify-content:center}
  .phint{font-style:italic;font-size:16px;color:rgba(0,47,167,.7)}
  .loading2{color:var(--mut);font-style:italic;font-size:17px;text-align:center;padding:30px}
  .spin{display:inline-block;width:14px;height:14px;border:2px solid var(--line);border-top-color:var(--klein);
    border-radius:50%;animation:s .8s linear infinite;vertical-align:-2px;margin-right:7px}
  @keyframes s{to{transform:rotate(360deg)}}
  .oseg{display:inline-flex;border:1px solid var(--line);border-radius:999px;overflow:hidden;background:var(--paper)}
  .ob{border:none;background:none;font-size:11px;font-weight:600;letter-spacing:.06em;padding:7px 14px;color:var(--mut)}
  .ob.on{background:var(--klein);color:var(--cream)}

  .cv-bar{display:flex;align-items:center;gap:12px;flex-wrap:wrap;padding-bottom:14px;border-bottom:1px solid var(--line)}
  .res-sw{width:30px;height:30px;border-radius:8px;border:1px solid rgba(12,20,48,.18);flex:none}
  .res-nm{font-size:22px;font-weight:500;color:var(--ink);line-height:1}
  .res-meta{font-size:12px;color:var(--mut);font-style:italic}
  .dchips{display:inline-flex;gap:6px}
  .dchip{width:22px;height:22px;border-radius:6px;border:1px solid rgba(12,20,48,.2);cursor:pointer}
  .dchip.on{outline:2px solid var(--klein);outline-offset:2px}
  .modes{display:inline-flex;border:1px solid var(--line);border-radius:999px;overflow:hidden;margin-left:auto;background:var(--paper)}
  .mtab{border:none;background:none;font-size:11px;font-weight:600;letter-spacing:.04em;padding:7px 14px;color:var(--mut)}
  .mtab.on{background:var(--klein);color:var(--cream)}

  .carousel{flex:1;min-height:0;display:flex;flex-direction:column;margin-top:14px}
  .slides{flex:1;min-height:300px;display:flex;overflow-x:auto;scroll-snap-type:x mandatory;
    scroll-behavior:smooth;scrollbar-width:none}
  .slides::-webkit-scrollbar{display:none}
  .acard{flex:0 0 100%;scroll-snap-align:center;display:flex;flex-direction:column;padding:6px 6px 2px;min-width:0}
  .acard-h{font-weight:600;font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:rgba(0,47,167,.6);margin-bottom:10px}
  .ribbon{display:flex;height:26px;border-radius:7px;overflow:hidden;border:1px solid rgba(12,20,48,.12);margin-bottom:16px}
  .ribbon span{flex:1}
  .acard-body{flex:1;display:flex;gap:18px;align-items:center}
  .figwrap{flex:0 0 150px;max-width:160px;display:flex;align-items:center;justify-content:center}
  .fitsvg{width:100%;height:auto;filter:drop-shadow(0 16px 26px rgba(16,20,60,.18))}
  .clist{flex:1;min-width:0;display:flex;flex-direction:column}
  .crow{display:grid;grid-template-columns:30px 1fr auto;align-items:center;gap:12px;padding:8px 0;border-top:1px solid var(--line)}
  .crow:first-child{border-top:none}
  .cw{width:30px;height:30px;border-radius:8px;border:1px solid rgba(12,20,48,.14)}
  .cnm{font-family:'Cormorant Garamond',Georgia,serif;font-size:19px;font-weight:500;min-width:0;color:var(--ink)}
  .chx{font-size:11px;color:var(--mut);font-family:ui-monospace,Menlo,monospace;white-space:nowrap}
  .crow.hit .cnm{color:var(--klein);font-weight:600}
  .crow .tag{font-size:10px;color:var(--klein);font-style:italic;margin-left:8px;font-family:'Hanken Grotesk',sans-serif}
  .acard.recap{align-items:center;justify-content:center;text-align:center}
  .recapt{font-size:27px;color:var(--ink);margin-bottom:10px}
  .recapd{color:var(--mut);max-width:48ch;margin:0 auto 16px;font-size:14px}
  .palette{display:flex;flex-wrap:wrap;gap:8px;justify-content:center}
  .pchip{width:30px;height:30px;border-radius:8px;border:1px solid rgba(12,20,48,.18)}
  .resnav{display:flex;align-items:center;justify-content:center;gap:14px;flex-wrap:wrap;padding-top:14px;border-top:1px solid var(--line)}
  .btn-nav{border:1px solid var(--line);background:var(--paper);color:var(--klein);border-radius:8px;
    padding:6px 16px;font-size:18px;line-height:1}
  .btn-nav:hover{background:rgba(0,47,167,.06)}
  .counter{font-size:13px;color:var(--mut);min-width:74px;text-align:center}

  /* ---- looks enregistrés ---- */
  .saved{margin-top:18px}
  .saved-h{display:flex;align-items:baseline;justify-content:space-between;margin:0 4px 12px}
  .saved-h .t{font-weight:600;font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:rgba(0,47,167,.7)}
  .saved-h .c{font-size:12px;color:rgba(12,20,48,.45);font-family:ui-monospace,Menlo,monospace}
  .looks{display:flex;gap:14px;overflow-x:auto;padding:4px;scrollbar-width:thin}
  .look{flex:none;width:118px;background:var(--paper);border:1px solid var(--line);border-radius:7px;
    padding:11px;position:relative;cursor:pointer;transition:transform .18s ease,box-shadow .18s ease}
  .look:hover{transform:translateY(-3px);box-shadow:0 16px 34px -22px rgba(0,32,138,.55)}
  .look-fig{height:96px;display:flex;align-items:flex-end;justify-content:center}
  .look .lp{width:52px;height:70px;border-radius:2px;background-size:cover;background-position:center;
    border:1px solid rgba(12,20,48,.14)}
  .look .lp.haut{margin-left:-22px;margin-bottom:16px;box-shadow:0 8px 16px -10px rgba(0,32,138,.5)}
  .look-nm{font-weight:500;font-size:11px;color:var(--ink);margin-top:8px}
  .look-meta{font-size:10px;color:rgba(12,20,48,.5);font-family:ui-monospace,Menlo,monospace;margin-top:2px;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .look .x{position:absolute;top:-7px;right:-7px;width:20px;height:20px;border-radius:50%;border:none;
    background:var(--klein);color:var(--cream);font-size:12px;line-height:20px;text-align:center;padding:0;
    opacity:0;transition:.15s}
  .look:hover .x{opacity:1}
  .saved-empty{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:16px;color:rgba(12,20,48,.45);padding:8px 4px}

  .pagehd{display:flex;align-items:center;gap:13px;margin:6px 4px 20px}
  .pagehd .tt{font-weight:600;font-size:17px;letter-spacing:.34em;color:var(--ink)}
  .pagehd .sub{font-size:11px;letter-spacing:.16em;color:rgba(12,20,48,.5);text-transform:uppercase;margin-top:5px}

  .toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);
    background:var(--klein);color:var(--cream);padding:11px 20px;border-radius:999px;font-size:13px;
    font-weight:500;letter-spacing:.02em;box-shadow:0 18px 40px -18px rgba(0,32,138,.7);
    opacity:0;pointer-events:none;transition:.3s;z-index:60;max-width:90vw;text-align:center}
  .toast.on{opacity:1;transform:translateX(-50%) translateY(0)}

  .drop{position:fixed;inset:0;background:rgba(0,32,138,.86);border:3px dashed var(--cream);display:none;
    align-items:center;justify-content:center;z-index:50;color:var(--cream);font-family:'Cormorant Garamond',serif;
    font-style:italic;font-size:34px}
  .drop.on{display:flex}

  @media(max-width:720px){
    .grid,.grid.detail{grid-template-columns:1fr}
    .stage{border-right:none;border-bottom:1px solid var(--line2);min-height:340px;padding:26px 20px}
    .det-title{font-size:26px}
    .piece.bas,.piece.haut{width:150px;height:196px}
    .piece.haut{margin-left:-54px;margin-bottom:42px}
    .modes{margin-left:0}
    .acard-body{flex-direction:column;align-items:center}
    .figwrap{flex-basis:auto;max-width:140px}.clist{width:100%}
  }
  @media(max-width:560px){.brand span{display:none}.band{padding:14px 16px}.tab{padding:7px 11px}}
</style>
</head>
<body>
<div class="shell">

  <div class="pagehd">
    <svg viewBox="0 0 100 100" width="38" height="38" fill="none" aria-hidden="true">
      <g fill="none" stroke="#002FA7" stroke-linecap="round"><circle cx="50" cy="50" r="45" stroke-width="0.8" opacity=".28" stroke-dasharray="1.4 7"/><circle cx="50" cy="50" r="37" stroke-width="1.5" opacity=".68" stroke-dasharray="13 20" transform="rotate(14 50 50)"/><circle cx="50" cy="50" r="29" stroke-width="1.8" opacity=".95" stroke-dasharray="22 27" transform="rotate(-12 50 50)"/><circle cx="50" cy="50" r="21" stroke-width="1.4" opacity=".58" stroke-dasharray="9 18" transform="rotate(42 50 50)"/><circle cx="50" cy="50" r="13" stroke-width="1.2" opacity=".4" stroke-dasharray="3 9" transform="rotate(8 50 50)"/></g><g stroke="#002FA7" stroke-width="1.9" stroke-linejoin="round" stroke-linecap="round" fill="none" transform="rotate(-7 50 50)"><path d="M50 27 Q 57.5 50 50 73 Q 42.5 50 50 27 Z"/><path d="M27 50 Q 50 42.5 73 50 Q 50 57.5 27 50 Z"/></g><circle cx="66" cy="34" r="2.7" fill="#002FA7"/>
    </svg>
    <div>
      <div class="tt">DAILY&nbsp;LAYERING</div>
      <div class="sub">Composition &middot; couleurs</div>
    </div>
  </div>

  <div class="card">
    <div class="band">
      <div class="brand">
        <svg viewBox="0 0 100 100" width="27" height="27" fill="none" aria-hidden="true"><g fill="none" stroke="#F3ECDA" stroke-linecap="round"><circle cx="50" cy="50" r="45" stroke-width="0.8" opacity=".3" stroke-dasharray="1.4 7"/><circle cx="50" cy="50" r="37" stroke-width="1.5" opacity=".7" stroke-dasharray="13 20" transform="rotate(14 50 50)"/><circle cx="50" cy="50" r="29" stroke-width="1.8" opacity=".98" stroke-dasharray="22 27" transform="rotate(-12 50 50)"/><circle cx="50" cy="50" r="21" stroke-width="1.4" opacity=".6" stroke-dasharray="9 18" transform="rotate(42 50 50)"/><circle cx="50" cy="50" r="13" stroke-width="1.2" opacity=".42" stroke-dasharray="3 9" transform="rotate(8 50 50)"/></g><g stroke="#F3ECDA" stroke-width="1.9" stroke-linejoin="round" stroke-linecap="round" fill="none" transform="rotate(-7 50 50)"><path d="M50 27 Q 57.5 50 50 73 Q 42.5 50 50 27 Z"/><path d="M27 50 Q 50 42.5 73 50 Q 50 57.5 27 50 Z"/></g><circle cx="66" cy="34" r="2.7" fill="#F3ECDA"/></svg>
        <span>DAILY&nbsp;LAYERING</span>
      </div>
      <div class="tabs">
        <button class="tab on" data-view="compose">Composer</button>
        <button class="tab" data-view="detail">Détail</button>
        <button class="tab" data-view="color">Couleurs</button>
      </div>
    </div>
    <div id="content"></div>
  </div>

  <div class="saved">
    <div class="saved-h"><span class="t">Mes looks</span><span class="c" id="lookCount">0</span></div>
    <div class="looks" id="looks"></div>
  </div>

</div>

<input type="file" id="file" accept="image/*" hidden>
<div class="toast" id="toast"></div>
<div class="drop" id="drop">Dépose ta photo</div>

<script>
"use strict";
const KLEIN="#002FA7", CREAM="#F3ECDA";

/* ============================================================
   MOTEUR COULEUR WADA — repris de l'ancienne app

async function loadModel(){

  const T=await import('https://cdn.jsdelivr.net/npm/@huggingface/transformers@3.5.2');

function analyzeFromSeg(res,img){

    if(!best||area>best.area)best={r,area};}
  if(!best)return{colors:[{r:128,g:128,b:128}],orient:S.color.orient};
  const orient=SEG_BOT.includes(best.r.label)?'bas':'haut';
  const W=best.r.mask.width,H=best.r.mask.height;
  const cv=document.createElement('canvas');cv.width=W;cv.height=H;const ctx=cv.getContext('2d');
  ctx.drawImage(img,0,0,W,H);const d=ctx.getImageData(0,0,W,H);const md=best.r.mask.data;
  const pts=[];
  for(let p=0;p<W*H;p++){if(md[p]>127){const i=p*4;pts.push([d.data[i],d.data[i+1],d.data[i+2]]);}}
  const km=kmeans(pts,3,8);const tot=km.counts.reduce((a,b)=>a+b,0)||1;
  let colors=km.centers.map((c,j)=>({r:c[0],g:c[1],b:c[2],frac:km.counts[j]/tot}))
    .filter(c=>c.frac>0.10).sort((a,b)=>b.frac-a.frac);
  if(!colors.length)colors=[{r:128,g:128,b:128}];
  return{colors,orient};}

function mountColor(){
  if(S.color.stage==='pick'&&S.color.img){
    const img=S.color.img,cv=$('.pcanvas');if(!cv)return;
    const ctx=cv.getContext('2d');ctx.drawImage(img,0,0,cv.width,cv.height);
    const off=document.createElement('canvas');off.width=img.naturalWidth||img.width;off.height=img.naturalHeight||img.height;
    off.getContext('2d').drawImage(img,0,0);
    const scale=cv.width/off.width;
    const pickAt=(cx,cy)=>{const rad=Math.max(4,Math.round(off.width*0.012));
      const rgb=sampleAvg(off,Math.round(cx/scale),Math.round(cy/scale),rad);
      S.color.sample={colors:[{r:rgb.r,g:rgb.g,b:rgb.b}],idx:0};S.color.stage='result';render();};
    const rel=e=>{const r=cv.getBoundingClientRect();const p=e.touches?e.touches[0]:e;
      return [(p.clientX-r.left)*cv.width/r.width,(p.clientY-r.top)*cv.height/r.height];};
    cv.onclick=e=>{const c=rel(e);pickAt(c[0],c[1]);};
    cv.ontouchstart=e=>{e.preventDefault();const c=rel(e);pickAt(c[0],c[1]);};
  }
  if(S.color.stage==='result'){
    const sl=$('.slides');if(sl){const cnt=$('.counter'),N=sl.children.length;
      const upd=()=>{const w=sl.clientWidth||1,i=Math.round(sl.scrollLeft/w);if(cnt)cnt.textContent=i>=N-1?'Récap':((i+1)+' / '+(N-1));};
      sl.onscroll=upd;upd();}
  }
}
async function runAuto(){
  const img=S.color.img;if(!img)return;
  const host=$('.cv-pick');if(host)host.innerHTML='<div class="loading2"><span class="spin"></span> Chargement du modèle IA…<br>(1er appel ~30–60 s, puis instantané)</div>';
  try{const seg=await loadModel();const res=await seg(img.src);const a=analyzeFromSeg(res,img);
    S.color.orient=a.orient;S.color.sample={colors:a.colors.map(c=>({r:c.r,g:c.g,b:c.b})),idx:0};
    S.color.stage='result';render();}
  catch(e){S.color.stage='pick';render();toast('IA indisponible — touche la couleur');}
}
function addColorToComposer(){
  const a=S.color.sample;if(!a)return;
  const top=nearest(a.colors[a.idx])[0].i,m=COLORS[top];
  const kind=S.color.orient==='haut'?'top':'bottom';
  const g={custom:true,tint:m.h,name:m.n,short:m.n.split(' ')[0].toLowerCase(),meta:'Wada · '+m.h.toUpperCase()};
  if(kind==='top'){S.tops.push(g);S.sel.top=S.tops.length-1;}else{S.bots.push(g);S.sel.bottom=S.bots.length-1;}
  S.view='compose';render();toast('Pièce ajoutée au composeur ✓');
}

/* ----- looks enregistrés ----- */
function looksHTML(){
  $("#lookCount").textContent=S.looks.length;
  const box=$("#looks");
  if(!S.looks.length){box.innerHTML=`<div class="saved-empty">Aucun look enregistré — compose puis « Enregistrer le look ».</div>`;return;}
  box.innerHTML=S.looks.map((L,i)=>`
    <div class="look" data-look="${i}" title="Charger ce look">
      <button class="x" data-rm="${i}" title="Supprimer">×</button>
      <div class="look-fig">
        <div class="lp bas ${L.b.img?"":"stripe"}" style="${swBg(L.b)}"></div>
        <div class="lp haut ${L.t.img?"":"stripe"}" style="${swBg(L.t)}"></div>
      </div>
      <div class="look-nm">${esc(L.name)}</div>
      <div class="look-meta">${esc(L.t.short||L.t.name)} · ${esc(L.b.short||L.b.name)}</div>
    </div>`).join("");
}

function render(){
  clampSel();
  document.querySelectorAll(".tab").forEach(b=>b.classList.toggle("on",b.dataset.view===S.view));
  const c=$("#content");
  c.innerHTML = S.view==="compose"?composeHTML() : S.view==="detail"?detailHTML() : colorHTML();
  looksHTML();
  if(S.view==="color")mountColor();
  persist();
}

/* ---------- interactions ---------- */
document.querySelectorAll(".tab").forEach(b=>b.onclick=()=>{S.view=b.dataset.view;render();});

document.addEventListener("click",e=>{
  const del=e.target.closest("[data-del]");
  if(del){e.stopPropagation();const p=del.dataset.del.split(":");removeGarment(p[0],+p[1]);return;}
  const thumb=e.target.closest(".thumb");
  if(thumb){const k=thumb.dataset.kind,i=+thumb.dataset.i;if(k==="top")S.sel.top=i;else S.sel.bottom=i;render();return;}
  const add=e.target.closest("[data-add]");
  if(add){S.fileMode="garment";S.addKind=add.dataset.add;$("#file").click();return;}
  if(e.target.closest("[data-save]")){saveLook(false);return;}
  if(e.target.closest("[data-dup]")){saveLook(true);return;}
  if(e.target.closest("[data-export]")){exportPNG();return;}
  /* couleurs */
  if(e.target.closest("[data-cphoto]")){S.fileMode="color";$("#file").click();return;}
  const cmode=e.target.closest("[data-cmode]");if(cmode){S.color.mode=cmode.dataset.cmode;render();return;}
  const corient=e.target.closest("[data-corient]");if(corient){S.color.orient=corient.dataset.corient;render();return;}
  const cidx=e.target.closest("[data-cidx]");if(cidx){S.color.sample.idx=+cidx.dataset.cidx;render();return;}
  const cnav=e.target.closest("[data-cnav]");if(cnav){const sl=$(".slides");if(sl)sl.scrollBy({left:(+cnav.dataset.cnav)*(sl.clientWidth||320),behavior:"smooth"});return;}
  if(e.target.closest("[data-cadd]")){addColorToComposer();return;}
  if(e.target.closest("[data-cia]")){runAuto();return;}
  /* looks */
  const rm=e.target.closest("[data-rm]");
  if(rm){e.stopPropagation();S.looks.splice(+rm.dataset.rm,1);render();toast("Look supprimé");return;}
  const look=e.target.closest(".look");
  if(look){loadLook(+look.dataset.look);return;}
});

/* fichier : garment (couleur moyenne) OU color (picker Wada) */
$("#file").onchange=function(){
  const f=this.files&&this.files[0];this.value="";if(!f)return;
  const r=new FileReader();
  r.onload=ev=>{
    const img=new Image();
    img.onload=()=>{
      if(S.fileMode==="color"){S.color.img=img;S.color.sample=null;S.color.stage="pick";S.view="color";render();return;}
      const max=360,sc=Math.min(1,max/Math.max(img.width,img.height));
      const w=Math.max(1,Math.round(img.width*sc)),h=Math.max(1,Math.round(img.height*sc));
      const cv=document.createElement("canvas");cv.width=w;cv.height=h;
      const ctx=cv.getContext("2d");ctx.drawImage(img,0,0,w,h);
      const tint=avgColor(ctx,w,h),dataURL=cv.toDataURL("image/jpeg",0.82);
      const kind=S.addKind,list=kind==="top"?S.tops:S.bots,n=list.filter(g=>g.custom).length+1;
      list.push({custom:true,img:dataURL,tint,name:(kind==="top"?"Haut photo ":"Bas photo ")+n,short:"photo "+n,meta:"ta pièce"});
      if(kind==="top")S.sel.top=S.tops.length-1;else S.sel.bottom=S.bots.length-1;
      render();toast("Pièce ajoutée ✓");
    };
    img.onerror=()=>toast("Image illisible");
    img.src=ev.target.result;
  };
  r.readAsDataURL(f);
};
function avgColor(ctx,w,h){
  let d;try{d=ctx.getImageData(0,0,w,h).data;}catch(e){return"#cccccc";}
  let R=0,G=0,B=0,n=0;
  for(let i=0;i<d.length;i+=28){if(d[i+3]<200)continue;R+=d[i];G+=d[i+1];B+=d[i+2];n++;}
  if(!n)return"#cccccc";
  const f=v=>("0"+Math.round(v/n).toString(16)).slice(-2);
  return"#"+f(R)+f(G)+f(B);
}
function removeGarment(kind,i){
  const list=kind==="top"?S.tops:S.bots;
  if(!list[i]||!list[i].custom)return;
  list.splice(i,1);
  if(kind==="top"&&S.sel.top>=S.tops.length)S.sel.top=S.tops.length-1;
  if(kind==="bottom"&&S.sel.bottom>=S.bots.length)S.sel.bottom=S.bots.length-1;
  render();toast("Pièce retirée");
}
function slim(g){return {name:g.name,short:g.short,meta:g.meta,tint:g.tint,img:g.img||null};}
function saveLook(dup){
  const n=S.looks.length+1;
  S.looks.unshift({name:"Look "+String(n).padStart(2,"0"),t:slim(topSel()),b:slim(botSel())});
  render();toast(dup?"Look dupliqué ✓":"Look enregistré ✓");
}
function loadLook(i){
  const L=S.looks[i];if(!L)return;
  S.sel.top=ensure(S.tops,L.t);S.sel.bottom=ensure(S.bots,L.b);
  S.view="compose";render();toast("Look chargé");
}
function ensure(list,g){
  let idx=list.findIndex(x=>x.name===g.name&&x.tint===g.tint&&(x.img||null)===(g.img||null));
  if(idx>=0)return idx;
  list.push({...g,custom:true});return list.length-1;
}
function exportPNG(){
  const t=topSel(),b=botSel();
  const W=900,H=1160,cv=document.createElement("canvas");cv.width=W;cv.height=H;
  const ctx=cv.getContext("2d");
  ctx.fillStyle="#FBF7EE";ctx.fillRect(0,0,W,H);
  ctx.fillStyle=KLEIN;ctx.fillRect(0,0,W,110);
  ctx.fillStyle=CREAM;ctx.font="600 30px 'Hanken Grotesk',sans-serif";
  ctx.textBaseline="middle";ctx.fillText("D A I L Y   L A Y E R I N G",46,57);
  const drawPiece=(g,x,y,w,h,rot,label)=>{
    ctx.save();ctx.translate(x+w/2,y+h/2);ctx.rotate(rot*Math.PI/180);
    ctx.shadowColor="rgba(0,32,138,.35)";ctx.shadowBlur=60;ctx.shadowOffsetY=30;
    if(g._im){ctx.drawImage(g._im,-w/2,-h/2,w,h);}else{ctx.fillStyle=g.tint||"#ccc";ctx.fillRect(-w/2,-h/2,w,h);}
    ctx.shadowColor="transparent";
    ctx.strokeStyle="rgba(12,20,48,.18)";ctx.lineWidth=2;ctx.strokeRect(-w/2,-h/2,w,h);
    ctx.fillStyle="rgba(0,47,167,.85)";ctx.font="600 18px 'Hanken Grotesk',sans-serif";
    ctx.textBaseline="top";ctx.fillText(label,-w/2+16,-h/2+16);
    ctx.restore();
  };
  const finish=()=>{
    drawPiece(b,200,330,360,470,-2.5,"BAS");
    drawPiece(t,360,250,360,470,3,"HAUT");
    ctx.fillStyle="#0C1430";ctx.font="500 italic 46px 'Cormorant Garamond',Georgia,serif";
    ctx.textBaseline="alphabetic";ctx.fillText("Superposition ivoire & marine",46,936);
    ctx.fillStyle="rgba(12,20,48,.6)";ctx.font="400 24px ui-monospace,monospace";
    ctx.fillText("haut — "+t.name,46,986);ctx.fillText("bas — "+b.name,46,1022);
    [t.tint,b.tint,KLEIN].forEach((c,i)=>{ctx.fillStyle=c||"#ccc";ctx.beginPath();ctx.arc(60+i*44,1084,15,0,7);ctx.fill();});
    const a=document.createElement("a");a.download="daily-layering-look.png";a.href=cv.toDataURL("image/png");a.click();toast("Look exporté ✓");
  };
  const imgs=[t,b].filter(g=>g.img);let pending=imgs.length;
  if(!pending){finish();return;}
  imgs.forEach(g=>{const im=new Image();im.onload=()=>{g._im=im;if(--pending===0)finish();};im.onerror=()=>{if(--pending===0)finish();};im.src=g.img;});
}

/* glisser-déposer → vue Couleurs */
const drop=$("#drop");let dc=0;
window.addEventListener("dragenter",e=>{e.preventDefault();dc++;drop.classList.add("on");});
window.addEventListener("dragover",e=>e.preventDefault());
window.addEventListener("dragleave",()=>{dc--;if(dc<=0)drop.classList.remove("on");});
window.addEventListener("drop",e=>{e.preventDefault();dc=0;drop.classList.remove("on");
  const f=e.dataTransfer.files[0];if(f&&f.type.startsWith("image/")){S.fileMode="color";const dt=new DataTransfer();dt.items.add(f);$("#file").files=dt.files;$("#file").onchange.call($("#file"));}});

render();
</script>
